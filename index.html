<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student City Guide — Pune | Find PGs, Hostels, Food & More</title>
  <meta name="description" content="Your one-stop guide to finding PGs, hostels, mess services, and weekend hangouts in Pune. Built for students, by students.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="home">

  <!-- Header -->
  <header class="header">
    <a href="/" class="logo"><span>🎓</span> Student City Guide</a>
    <div class="header-right">
      <div id="auth-area"></div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Discover Pune Like a Local</h1>
    <p>Find the best PGs, hostels, mess services, and weekend spots — all in one place, on the map.</p>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search PGs, hostels, cafes, services..." autocomplete="off">
      <button onclick="applyFilters()">Search</button>
    </div>
    <div class="category-tabs">
      <button class="category-tab active" data-category="">All</button>
      <button class="category-tab" data-category="accommodation">🏠 Accommodation</button>
      <button class="category-tab" data-category="food">🍽️ Food & Mess</button>
      <button class="category-tab" data-category="services">🛠️ Services</button>
      <button class="category-tab" data-category="explore">🎉 Explore</button>
    </div>
  </section>

  <!-- Main Split Layout -->
  <div class="main-content with-hero">
    <!-- Left: Listings Panel -->
    <div class="listings-panel">
      <div class="panel-header">
        <h2>Places</h2>
        <span id="result-count">Loading...</span>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <select id="sort-select">
          <option value="">Sort by</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="rating">Top Rated</option>
          <option value="distance">Nearest First</option>
          <option value="reviews">Most Reviewed</option>
        </select>
        <div class="budget-filter">
          <label>Budget:</label>
          <input type="range" id="budget-slider" min="0" max="50000" step="500" value="50000">
          <span id="budget-value">₹50,000</span>
        </div>
        <button class="diet-filter" data-diet="veg">🟢 Veg</button>
        <button class="diet-filter" data-diet="nonveg">🔴 Non-Veg</button>
      </div>
      <div id="subcategory-chips"></div>

      <!-- Listings Container -->
      <div id="listings-container">
        <div class="empty-state"><div class="empty-icon">⏳</div><h3>Loading places...</h3></div>
      </div>

      <!-- Recommendations -->
      <div id="recommendations"></div>
    </div>

    <!-- Right: Map Panel -->
    <div class="map-panel">
      <div id="map"></div>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <button class="mobile-toggle" id="map-toggle">🗺️ Toggle Map</button>
    <button class="mobile-toggle" id="filter-toggle">⚙️ Filters</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/utils.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/filters.js"></script>
  <script src="/js/listings.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/reviews.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
